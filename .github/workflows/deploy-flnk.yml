name: Deploy flnk

# Manual trigger only — this repo deploys explicitly (CI does not auto-deploy).
# Run from the Actions tab, optionally choosing a ref to deploy.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN        deploy auth for wrangler/OpenNext
#   CLOUDFLARE_ACCOUNT_ID       deploy auth for wrangler/OpenNext
#   FLNK_ALLOWED_EMAILS         Worker runtime secret — sign-in allow-list
#                               (comma-separated; empty keeps open registration)
#   FLNK_CLOUDFLARE_API_TOKEN   Worker runtime secret — Analytics Engine SQL
#                               API token (Account Analytics:Read); optional,
#                               stats endpoints degrade gracefully without it
# One-time Worker secrets NOT managed here (set once via `wrangler secret put`,
# they persist across deploys): BETTER_AUTH_SECRET, GOOGLE_CLIENT_ID/SECRET,
# GITHUB_CLIENT_ID/SECRET.
on:
  workflow_dispatch:
    inputs:
      run_migrations:
        description: 'Apply D1 remote migrations before deploy (only when DB_TYPE=d1)'
        type: boolean
        default: false

concurrency:
  group: deploy-flnk
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Cloudflare credentials used by wrangler / OpenNext to deploy the Worker.
      # Add these as repository secrets (Settings → Secrets and variables → Actions).
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Kept in sync with the repo-root .node-version (currently 24).
          node-version-file: .node-version
          cache: pnpm

      # Also builds workspace packages via the root `prepare` script.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Optional: apply D1 migrations to the remote database before deploying.
      # Only relevant when the Worker uses DB_TYPE=d1 and wrangler.jsonc has a
      # real d1_databases database_id. Turso/libsql deploys migrate out of band.
      - name: Apply D1 migrations (remote)
        if: ${{ inputs.run_migrations }}
        run: pnpm --filter @cdlab996/flnk cf:remotedb

      # `run` is required: `deploy` is also a pnpm built-in command, and
      # without `run` pnpm invokes the built-in (which demands a target dir)
      # instead of the package script.
      - name: Build & deploy
        run: pnpm --filter @cdlab996/flnk run deploy

      # Sync Worker runtime secrets from GitHub secrets (idempotent, runs every
      # deploy). Runs AFTER the deploy: a secret cannot be created while the
      # live Worker still carries a plain-text var of the same name (API error
      # 10053) — deploying first replaces the binding set from wrangler.jsonc,
      # which no longer defines these as vars. Empty values are skipped so an
      # unset GitHub secret never wipes an existing Worker secret.
      - name: Sync Worker secrets
        working-directory: apps/flnk
        env:
          FLNK_ALLOWED_EMAILS: ${{ secrets.FLNK_ALLOWED_EMAILS }}
          FLNK_CLOUDFLARE_API_TOKEN: ${{ secrets.FLNK_CLOUDFLARE_API_TOKEN }}
        run: |
          jq -n '
            [
              {key: "ALLOWED_EMAILS",       value: env.FLNK_ALLOWED_EMAILS},
              {key: "CLOUDFLARE_API_TOKEN", value: env.FLNK_CLOUDFLARE_API_TOKEN}
            ]
            | map(select(.value != null and .value != ""))
            | from_entries
          ' > "$RUNNER_TEMP/flnk-secrets.json"
          if [ "$(jq 'length' "$RUNNER_TEMP/flnk-secrets.json")" -eq 0 ]; then
            echo "No Worker secrets provided — skipping sync"
          else
            jq 'keys' "$RUNNER_TEMP/flnk-secrets.json"
            pnpm exec wrangler secret bulk "$RUNNER_TEMP/flnk-secrets.json"
          fi
          rm -f "$RUNNER_TEMP/flnk-secrets.json"
